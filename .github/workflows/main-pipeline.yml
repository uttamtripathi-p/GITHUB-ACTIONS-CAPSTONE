name: main branch pipeline
on:
  push:
    branches: [master]


jobs:
  build-test:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      run_tests: true


  prep:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
    steps:
      - id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT


  build-push:
    uses: ./.github/workflows/reusable-docker.yml
    needs: prep
    with:
      image_name: ${{ github.repository }}
      tag: ${{ needs.prep.outputs.short_sha }}
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}
    run: |
      echo "${{ outputs.test-result }}"
  deploy: 
    runs-on: ubuntu-latest
    needs: [build-push, prep]
    environment: environment
    steps:
      - name: deploy message
        run: |  
          echo "Deploying image: ghcr.io/${GITHUB_REPOSITORY}:${{ needs.prep.outputs.short_sha }} to production"
          echo "The environment being used is : ${{ vars.SITE }}"
      - name: success message
        if: success()
        run: echo "SUCCESSFULL"
