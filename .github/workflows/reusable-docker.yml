name: reusable workflow docker build & push
on:
  workflow_call:
    inputs:
      image_name:
        description: "name of image"
        required: true
        type: string
      tag:
        description: "tag of the image"
        required: true
        type: string
    outputs:
      image_url: 
        description: "full image path"
        value: ${{ jobs.build-and-push.outputs.image_url }}

    secrets:
      docker_username:
        description: "dockerhub username"
        required: true
      docker_token: 
        description: "dockerhub secret token"
        required: true


jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_url: ${{ steps.image_url.outputs.image_url }} 
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: login to docker hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.docker_username }}
          password: ${{ secrets.docker_token }} 
      - name: build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.docker_username }}/github-actions-capstone:${{ inputs.tag }}
      - name: image url output
        id: image_url
        if: success()
        run: |
          echo "image_url=${{ inputs.image_name }}:${{ inputs.tag }}" >> $GITHUB_OUTPUT


